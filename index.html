<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERVI</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

header {
    background:white;
    padding:15px;
    text-align:center;
}

.container {
    max-width:500px;
    margin:auto;
    padding:15px;
}

/* PRODUCTO */
.product {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* CONTROLES */
.controls button {
    background:#0d6efd;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
}

/* CHECKOUT */
.checkout {
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:8px;
}

/* TOTAL */
#total {
    font-weight:bold;
    font-size:18px;
    margin:10px 0;
}

/* BOTON */
.btn {
    width:100%;
    background:#25D366;
    color:white;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* ADMIN */
.admin {
    display:none;
    background:#fff8e1;
    padding:15px;
    margin:15px auto;
    border-radius:12px;
    max-width:500px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.admin h3 {
    margin-top:0;
    font-size:16px;
}

.admin-card {
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.admin-row {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

.admin input, .admin select {
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
}

.small { width:90px; }
.medium { width:140px; }

.admin button {
    background:#ffc107;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.info {
    font-size:12px;
    color:#666;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
<h2>FERVI</h2>
<p style="font-size:12px;color:gray;">Distribuidora de artículos sanitarios</p>
</header>

<!-- ADMIN -->
<div class="admin" id="adminPanel">

<h3>⚙️ Panel de administración</h3>

<div class="admin-card">
<label>Ajuste general (%)</label>

<div class="admin-row">
<input type="number" id="margenGeneral" class="small">
<button onclick="guardarMargen()">Guardar</button>
</div>

<div class="info">
Actual: <span id="verMargen"></span>
</div>
</div>

<div class="admin-card">
<label>Ajuste por marca</label>

<div class="admin-row">
<select id="marca" class="medium">
<option value="termofusion">Termofusión</option>
<option value="valvulas">Válvulas</option>
</select>

<input type="number" id="ajusteMarca" class="small" placeholder="%">

<button onclick="guardarMarca()">Aplicar</button>
</div>

<div class="info" id="estadoMarca"></div>
</div>

</div>

<!-- PRODUCTOS -->
<div class="container" id="productos"></div>

<!-- CHECKOUT -->
<div class="container checkout">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="direccion" placeholder="Dirección">

<div id="total">Total: $0</div>

<button class="btn" onclick="enviar()">📲 Enviar pedido por WhatsApp</button>

</div>

<script>

/* ADMIN MODE */
const params = new URLSearchParams(window.location.search);
if(params.get("admin") === "true"){
    document.getElementById("adminPanel").style.display = "block";
}

/* CONFIG */
let config = {
    margen:25,
    marcas:{
        termofusion:0,
        valvulas:0
    }
};

/* CARGAR CONFIG */
let guardado = localStorage.getItem("configFervi");
if(guardado){
    config = JSON.parse(guardado);
}

/* MOSTRAR CONFIG */
document.getElementById("margenGeneral").value = config.margen;
document.getElementById("verMargen").innerText = config.margen + "%";

/* PRODUCTOS */
let productos = [
{nombre:"Caño 20mm", base:5772, marca:"termofusion", cant:0},
{nombre:"Caño 25mm", base:8708, marca:"termofusion", cant:0},
{nombre:"Codo 25mm", base:516, marca:"termofusion", cant:0},
{nombre:"Válvula 1/2", base:1476, marca:"valvulas", cant:0}
];

/* CALCULO */
function precioFinal(p){

let precio = p.base;

/* margen general */
precio *= (1 + config.margen/100);

/* ajuste por marca */
precio *= (1 + config.marcas[p.marca]/100);

return Math.round(precio);

}

/* RENDER */
function render(){

let html = "";

productos.forEach((p,i)=>{

html += `
<div class="product">
<div>
<b>${p.nombre}</b><br>
$${precioFinal(p)}
</div>

<div class="controls">
<button onclick="cambiar(${i},-1)">-</button>
${p.cant}
<button onclick="cambiar(${i},1)">+</button>
</div>
</div>
`;

});

document.getElementById("productos").innerHTML = html;

}

/* CAMBIAR */
function cambiar(i,v){

productos[i].cant += v;
if(productos[i].cant < 0) productos[i].cant = 0;

render();
total();

}

/* TOTAL */
function total(){

let t = 0;

productos.forEach(p=>{
t += precioFinal(p) * p.cant;
});

document.getElementById("total").innerText = "Total: $" + t;

}

/* GUARDAR */
function guardarEnLocalStorage(){
    localStorage.setItem("configFervi", JSON.stringify(config));
}

/* ADMIN */
function guardarMargen(){

let valor = parseFloat(document.getElementById("margenGeneral").value);

if(isNaN(valor) || valor < -100 || valor > 100){
    alert("Valor inválido (-100 a 100)");
    return;
}

config.margen = valor;

document.getElementById("verMargen").innerText = valor + "%";

guardarEnLocalStorage();
render();
total();

}

function guardarMarca(){

let marca = document.getElementById("marca").value;
let valor = parseFloat(document.getElementById("ajusteMarca").value);

if(isNaN(valor) || valor < -100 || valor > 100){
    alert("Valor inválido (-100 a 100)");
    return;
}

config.marcas[marca] = valor;

document.getElementById("estadoMarca").innerText =
"Ajuste en " + marca + ": " + valor + "%";

guardarEnLocalStorage();
render();
total();

}

/* WHATSAPP */
function enviar(){

let nombre = document.getElementById("nombre").value;
let direccion = document.getElementById("direccion").value;

let msg = "🧾 *Pedido FERVI*%0A%0A";

let totalPedido = 0;

productos.forEach(p=>{
if(p.cant>0){

let precio = precioFinal(p);
let subtotal = precio * p.cant;
totalPedido += subtotal;

msg += `• ${p.nombre}%0A`;
msg += `  ${p.cant} x $${precio} = $${subtotal}%0A%0A`;

}
});

msg += `💰 *Total: $${totalPedido}*%0A%0A`;
msg += `👤 ${nombre}%0A`;
msg += `📍 ${direccion}`;

window.open("https://wa.me/5491158410683?text="+msg);

}

render();
total();

</script>

</body>
</html>
